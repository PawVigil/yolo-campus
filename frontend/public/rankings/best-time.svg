<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" fill="none">
  <!-- Clock with paw print - best observation time -->
  <g opacity="0.1" fill="#1a3300">
    <!-- clock face -->
    <circle cx="150" cy="130" r="70" fill="none" stroke="#1a3300" stroke-width="4" opacity="0.1"/>
    <!-- hour markers -->
    <circle cx="150" cy="65" r="3"/>
    <circle cx="215" cy="130" r="3"/>
    <circle cx="150" cy="195" r="3"/>
    <circle cx="85" cy="130" r="3"/>
    <!-- hands -->
    <line x1="150" y1="130" x2="150" y2="80" stroke="#1a3300" stroke-width="3" opacity="0.12"/>
    <line x1="150" y1="130" x2="195" y2="130" stroke="#1a3300" stroke-width="2" opacity="0.1"/>
    <!-- center dot -->
    <circle cx="150" cy="130" r="4" opacity="0.15"/>
  </g>
  <!-- Paw print accent -->
  <g opacity="0.07" fill="#a8e5e5">
    <ellipse cx="150" cy="220" rx="12" ry="10"/>
    <circle cx="140" cy="208" r="4"/>
    <circle cx="150" cy="205" r="4"/>
    <circle cx="160" cy="208" r="4"/>
  </g>
</svg>
