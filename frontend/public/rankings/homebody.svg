<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" fill="none">
  <!-- Cat curled up on cushion - homebody -->
  <g opacity="0.1" fill="#1a3300">
    <!-- cushion -->
    <ellipse cx="150" cy="200" rx="80" ry="25"/>
    <!-- curled body -->
    <ellipse cx="150" cy="175" rx="55" ry="35"/>
    <!-- head tucked in -->
    <circle cx="115" cy="160" r="28"/>
    <!-- ears -->
    <polygon points="98,140 90,118 108,135"/>
    <polygon points="125,138 130,115 118,132"/>
    <!-- tail wrapping around -->
    <path d="M200,185 Q220,170 215,150 Q210,135 195,140 Q205,155 200,170" stroke-width="10" stroke="#1a3300" fill="none" opacity="0.1"/>
    <!-- closed eyes (sleeping) -->
    <path d="M105,158 Q108,155 112,158" stroke="#1a3300" stroke-width="2" fill="none" opacity="0.12"/>
    <path d="M118,155 Q121,152 125,155" stroke="#1a3300" stroke-width="2" fill="none" opacity="0.12"/>
    <!-- zzz -->
    <text x="140" y="140" font-size="14" font-family="sans-serif" fill="#1a3300" opacity="0.08">z</text>
    <text x="150" y="128" font-size="11" font-family="sans-serif" fill="#1a3300" opacity="0.06">z</text>
    <text x="158" y="118" font-size="9" font-family="sans-serif" fill="#1a3300" opacity="0.04">z</text>
  </g>
  <!-- House accent -->
  <g opacity="0.06" fill="#d5f5c2">
    <rect x="80" y="210" width="140" height="40" rx="4"/>
    <polygon points="80,210 150,185 220,210"/>
  </g>
</svg>
