<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawVigil · YOLO 检测演示</title>
<style>
  /* ===== 全局 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f2f5; color: #1d1d1f; min-height: 100vh;
  }
  /* ===== 顶栏 ===== */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff; padding: 20px 40px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  .header h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
  .header .sub {
    font-size: 14px; color: rgba(255,255,255,.65); margin-left: auto;
    background: rgba(255,255,255,.1); padding: 4px 14px; border-radius: 20px;
  }
  .logo-icon { font-size: 28px; }

  /* ===== 主体 ===== */
  .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

  /* ===== 上传区 ===== */
  .upload-area {
    background: #fff; border-radius: 16px; padding: 50px 30px;
    text-align: center; border: 2px dashed #d0d0d0;
    cursor: pointer; transition: all .25s;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: #0f3460; background: #f8faff;
  }
  .upload-area .icon { font-size: 48px; color: #0f3460; }
  .upload-area p { margin-top: 12px; font-size: 16px; color: #666; }
  .upload-area .hint { font-size: 13px; color: #999; margin-top: 6px; }
  .upload-area input[type="file"] { display: none; }

  /* ===== 加载 ===== */
  .spinner-wrap {
    display: none; justify-content: center; align-items: center;
    flex-direction: column; gap: 16px; padding: 60px 0;
  }
  .spinner-wrap.active { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #e0e0e0; border-top-color: #0f3460;
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== 结果区 ===== */
  .result-wrap { display: none; margin-top: 30px; }
  .result-wrap.active { display: block; }

  /* 图片对比 */
  .image-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;
  }
  .image-card {
    background: #fff; border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,.08);
  }
  .image-card .label {
    padding: 10px 16px; font-size: 14px; font-weight: 500;
    background: #fafafa; border-bottom: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: center;
  }
  .image-card .label .badge {
    font-size: 12px; background: #0f3460; color: #fff;
    padding: 2px 10px; border-radius: 10px;
  }
  .image-card img { width: 100%; display: block; }

  /* 检测结果表格 */
  .result-table-wrap {
    background: #fff; border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,.08);
  }
  .result-table-wrap .title {
    padding: 14px 20px; font-size: 16px; font-weight: 600;
    border-bottom: 1px solid #eee;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 12px 20px; font-size: 13px;
    font-weight: 500; color: #888; background: #fafafa;
    border-bottom: 1px solid #eee;
  }
  td {
    padding: 12px 20px; font-size: 14px; border-bottom: 1px solid #f0f0f0;
  }
  tr:last-child td { border-bottom: none; }
  .conf-high { color: #34c759; font-weight: 600; }
  .conf-mid  { color: #ff9500; font-weight: 600; }
  .conf-low  { color: #ff3b30; font-weight: 600; }
  .breed-tag {
    display: inline-block; background: #e8f0fe; color: #0f3460;
    padding: 2px 12px; border-radius: 12px; font-size: 13px;
  }

  /* ===== 空结果提示 ===== */
  .empty-msg {
    text-align: center; padding: 30px; color: #999; font-size: 15px;
  }

  /* ===== 页脚 ===== */
  .footer {
    text-align: center; color: #aaa; font-size: 13px;
    padding: 30px 20px 20px;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 720px) {
    .image-row { grid-template-columns: 1fr; }
    .header { flex-wrap: wrap; padding: 14px 20px; }
    .header .sub { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
  <span class="logo-icon">🐾</span>
  <h1>PawVigil · YOLO 检测演示</h1>
  <span class="sub">校园流浪动物观测关爱系统</span>
</div>

<div class="container">

  <!-- 上传区 -->
  <div class="upload-area" id="uploadArea">
    <div class="icon">📤</div>
    <p><strong>点击上传</strong> 或拖拽图片到此区域</p>
    <p class="hint">支持 JPG / PNG，建议 640×640 以上效果更佳</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <!-- 加载 -->
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    <p style="color:#666;font-size:15px;">🔍 YOLO 模型检测中…</p>
  </div>

  <!-- 结果 -->
  <div class="result-wrap" id="resultWrap">
    <!-- 图片对比 -->
    <div class="image-row">
      <div class="image-card">
        <div class="label">
          原始图片
          <span class="badge">输入</span>
        </div>
        <img id="originalImg" src="" alt="原始图片">
      </div>
      <div class="image-card">
        <div class="label">
          检测结果
          <span class="badge" id="countBadge">0 个目标</span>
        </div>
        <img id="resultImg" src="" alt="检测结果">
      </div>
    </div>

    <!-- 检测详情 -->
    <div class="result-table-wrap">
      <div class="title">📋 检测详情</div>
      <div id="tableBody">
        <div class="empty-msg">未检测到目标</div>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  Powered by YOLOv8 · Oxford Pets 37 breeds &nbsp;·&nbsp; 🐱🐶
</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const spinner = document.getElementById('spinner');
const resultWrap = document.getElementById('resultWrap');
const originalImg = document.getElementById('originalImg');
const resultImg = document.getElementById('resultImg');
const countBadge = document.getElementById('countBadge');
const tableBody = document.getElementById('tableBody');

// 点击上传
uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  if (!file.type.startsWith('image/')) return alert('请上传图片文件');

  // 显示加载
  uploadArea.style.display = 'none';
  resultWrap.classList.remove('active');
  spinner.classList.add('active');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const resp = await fetch('/detect', { method: 'POST', body: formData });
    const data = await resp.json();

    spinner.classList.remove('active');

    // 显示图片
    originalImg.src = 'data:image/jpeg;base64,' + data.original_base64;
    resultImg.src = 'data:image/jpeg;base64,' + data.image_base64;

    // 更新计数
    countBadge.textContent = data.count + ' 个目标';

    // 渲染表格
    if (data.detections.length === 0) {
      tableBody.innerHTML = '<div class="empty-msg">未检测到猫狗目标 🤔</div>';
    } else {
      let html = `<table>
        <thead><tr>
          <th>#</th><th>品种（中文）</th><th>品种（英文）</th>
          <th>置信度</th><th>位置</th>
        </tr></thead><tbody>`;
      data.detections.forEach((d, i) => {
        const confVal = parseFloat(d.confidence);
        const cls = confVal >= 0.8 ? 'conf-high' : confVal >= 0.5 ? 'conf-mid' : 'conf-low';
        html += `<tr>
          <td>${i + 1}</td>
          <td><span class="breed-tag">${d.breed_cn}</span></td>
          <td>${d.breed_en}</td>
          <td class="${cls}">${d.confidence}</td>
          <td style="font-size:12px;color:#888;">${d.location}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      tableBody.innerHTML = html;
    }

    resultWrap.classList.add('active');
  } catch (err) {
    spinner.classList.remove('active');
    alert('检测出错：' + err.message);
    uploadArea.style.display = 'block';
  }
}
</script>
</body>
</html>
